<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Agregar noticia</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body>

  <div class="container">
    <h1>Agregar noticia</h1>

    <form action="/guardar" method="POST" class="formulario">
      
      <div class="campo">
        <label for="titulo">Título</label>
        <input type="text" id="titulo" name="titulo" placeholder="Ingrese el título" required>
      </div>

      <div class="campo">
        <label for="contenido">Contenido</label>
        <textarea id="contenido" name="contenido" rows="6" placeholder="Ingrese el contenido" required></textarea>
      </div>

      <button type="submit">Guardar noticia</button>
    </form>

    <a href="/" class="volver">← Volver al inicio</a>
  </div>

</body>
</html>
